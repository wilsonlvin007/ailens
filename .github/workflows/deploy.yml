name: Deploy Site

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/daily.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Debug: check CSS output
        run: |
          echo "=== Style blocks in dist/index.html ==="
          grep -c '<style' dist/index.html || echo "0"
          echo "=== Check for Hero/Signals CSS ==="
          grep -c 'n-l1' dist/index.html || echo "n-l1: NOT FOUND"
          grep -c 'signal-card' dist/index.html || echo "signal-card: NOT FOUND"
          echo "=== Check data files ==="
          ls -la public/data/ || echo "NO DATA DIR"
          echo "=== dist/data/ ==="
          ls -la dist/data/ 2>/dev/null || echo "NO dist/data/"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
