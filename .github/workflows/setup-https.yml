name: Setup HTTPS

on:
  workflow_dispatch:

jobs:
  setup-https:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install certbot
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            sudo apt update -qq
            sudo apt install -y certbot python3-certbot-nginx

      - name: Obtain SSL certificate
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            sudo certbot --nginx -d www.ailens.news -d ailens.news --non-interactive --agree-tos --email bot@ailens.news --redirect

      - name: Verify and reload
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            sudo nginx -t && sudo systemctl reload nginx
            echo "HTTPS setup complete"
