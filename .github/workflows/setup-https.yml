name: Setup HTTPS

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      - run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} << 'REMOTE'
          sudo tee /etc/nginx/sites-available/ailens > /dev/null << 'NGINX'
          server {
              listen 80;
              server_name www.ailens.news ailens.news;
              return 301 https://$host$request_uri;
          }
          server {
              listen 443 ssl;
              server_name www.ailens.news ailens.news;
              root /var/www/ailens;
              index index.html;
              ssl_certificate /etc/letsencrypt/live/www.ailens.news/fullchain.pem;
              ssl_certificate_key /etc/letsencrypt/live/www.ailens.news/privkey.pem;
              location / {
                  try_files $uri $uri/ /index.html;
              }
          }
          NGINX
          sudo nginx -t && sudo systemctl reload nginx
          echo "OK"
          REMOTE
      - run: |
          sleep 2
          echo "HTTP redirect:"
          curl -sko /dev/null -w "  %{http_code} -> %{redirect_url}\n" http://www.ailens.news/
          echo "HTTPS:"
          curl -sko /dev/null -w "  %{http_code}\n" https://www.ailens.news/
