name: Setup HTTPS

on:
  workflow_dispatch:

jobs:
  setup-https:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Install certbot
        run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} 'sudo apt update -qq && sudo apt install -y certbot python3-certbot-nginx'

      - name: Obtain SSL certificate
        run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} 'sudo certbot --nginx -d www.ailens.news -d ailens.news --non-interactive --agree-tos --email bot@ailens.news --redirect'

      - name: Verify HTTPS
        run: |
         ssh ubuntu@${{ secrets.SERVER_HOST }} 'sudo nginx -t && sudo systemctl reload nginx'
          sleep 5
          curl -sI https://www.ailens.news/ | head -5
