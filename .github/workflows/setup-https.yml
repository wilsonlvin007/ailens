name: Setup HTTPS

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      - run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} 'sudo apt update -qq && sudo apt install -y certbot python3-certbot-nginx'
      - run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} 'sudo certbot --nginx -d www.ailens.news -d ailens.news --non-interactive --agree-tos --email bot@ailens.news --redirect || true'
      - run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} 'sudo nginx -t && sudo systemctl reload nginx'
          curl -sI https://www.ailens.news/ | head -5
