name: Setup HTTPS

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
      - run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} << 'REMOTE'
            # Create nginx site config for the domain
            sudo tee /etc/nginx/sites-available/ailens > /dev/null << 'NGINX'
            server {
                listen 80;
                server_name www.ailens.news ailens.news;
                root /var/www/ailens;
                index index.html;
                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            NGINX
            sudo ln -sf /etc/nginx/sites-available/ailens /etc/nginx/sites-enabled/ailens
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo apt update -qq
            sudo apt install -y certbot python3-certbot-nginx
            sudo certbot --nginx -d www.ailens.news -d ailens.news --non-interactive --agree-tos --email bot@ailens.news --redirect
            sudo nginx -t && sudo systemctl reload nginx
            REMOTE
      - run: curl -sI https://www.ailens.news/ | head -5
