name: Setup HTTPS

on:
  workflow_dispatch:

jobs:
  setup-https:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create nginx site config
        run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} 'sudo tee /etc/nginx/sites-available/ailens <<NGINX
server {
    listen 80;
    server_name www.ailens.news ailens.news;
    root /var/www/ailens;
    index index.html;
    location / {
        try_files \$uri \$uri/ /index.html;
    }
    location /data/ {
        alias /var/www/ailens/data/;
    }
}
NGINX
sudo ln -sf /etc/nginx/sites-available/ailens /etc/nginx/sites-enabled/ailens
sudo rm -f /etc/nginx/sites-enabled/default
sudo nginx -t && sudo systemctl reload nginx'

      - name: Install certbot
        run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} 'sudo apt update -qq && sudo apt install -y certbot python3-certbot-nginx'

      - name: Obtain SSL certificate
        run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} 'sudo certbot --nginx -d www.ailens.news -d ailens.news --non-interactive --agree-tos --email bot@ailens.news --redirect'

      - name: Verify HTTPS
        run: |
          ssh ubuntu@${{ secrets.SERVER_HOST }} 'sudo nginx -t && sudo systemctl reload nginx'
          sleep 5
          curl -sI https://www.ailens.news/ | head -5
