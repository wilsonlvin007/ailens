name: Daily AI News Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'public/data/**'
  schedule:
    # 每天 UTC 22:00 = 北京时间 06:00
    - cron: '0 22 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -q requests

      - name: Call Dify workflow & process output
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          DIFY_API_URL: https://api.dify.ai/v1/workflows/run
        run: |
          python3 << 'PYEOF'
          import json, subprocess, sys, os
          from datetime import datetime, timezone, timedelta
          sys.path.insert(0, 'scripts')
          from collect import main

          # 1. 采集
          raw = main()
          raw_items_all = json.loads(raw)[:20]
          # 去重：排除过去5天已出现过的 source URL
          from pathlib import Path
          _data_dir = Path('public/data')
          seen_sources = set()
          for d_offset in range(1, 6):
              past_date = (datetime.now(timezone(timedelta(hours=8))) - timedelta(days=d_offset)).strftime('%Y-%m-%d')
              past_file = _data_dir / f'{past_date}.json'
              if past_file.exists():
                  try:
                      past_data = json.loads(open(past_file).read())
                      for it in past_data.get('items', []):
                          if it.get('source'):
                              seen_sources.add(it['source'])
                  except:
                      pass
          fresh_raw = [it for it in raw_items_all if it.get('url', '') not in seen_sources]
          # 如果去重后不够10条，用原列表补足
          if len(fresh_raw) < 20:
              extra = [it for it in raw_items_all if it.get('url', '') in seen_sources][:20 - len(fresh_raw)]
              fresh_raw += extra
          items = fresh_raw[:20]
          print(f"Raw: {len(raw_items_all)} -> dedup: {len(fresh_raw)} -> to Dify: {len(items)} (seen sources: {len(seen_sources)})")
          date = (datetime.now(timezone(timedelta(hours=8)))).strftime('%Y-%m-%d')
          print(f"Collected {len(items)} items for {date}")

          if len(items) == 0:
              print("No items collected, exiting.")
              sys.exit(0)

          # 2. 调 Dify workflow
          payload = {
              'inputs': {'date': date, 'raw_items': json.dumps(items, ensure_ascii=False)},
              'response_mode': 'streaming',
              'user': 'ailens-pipeline'
          }

          with open('/tmp/dify_payload.json', 'w') as f:
              json.dump(payload, f)

          api_key = os.environ.get('DIFY_API_KEY', '')
          api_url = os.environ.get('DIFY_API_URL', 'https://api.dify.ai/v1/workflows/run')

          print(f"Calling Dify workflow...")

          def quality_check(data):
              """上线前质检：结构完整性 + 内容质量，返回 (passed, warnings, errors)"""
              errors = []
              warnings = []

              # --- 整体结构 ---
              if not data.get('date'):
                  errors.append('缺少 date 字段')
              elif not re.match(r'^\d{4}-\d{2}-\d{2}$', str(data['date'])):
                  errors.append(f"date 格式异常: {data['date']}")

              items = data.get('items', [])
              if not isinstance(items, list) or len(items) == 0:
                  errors.append(f'items 为空或不是列表 (type={type(items).__name__})')

              # --- 逐条新闻 ---
              for i, item in enumerate(items):
                  prefix = f'item[{i}]'

                  # 必填字段
                  for field in ['id', 'title', 'category', 'importance', 'source', 'source_name', 'summary', 'analysis']:
                      if not item.get(field):
                          errors.append(f'{prefix}: 缺少 {field}')

                  # title 校验
                  title = item.get('title', '')
                  if title:
                      # 超长标题：只警告，不自动截断（Dify 生成的标题比 summary 截取更准确）
                      if len(title) > 30:
                          warnings.append(f'{prefix}: title "{title}" 超长({len(title)}字)，已保留原标题')
                      # 检查是否是日期型标题（如 "2026-05-15 ..." 或纯数字日期）
                      elif re.match(r'^\d{4}[-/]\d{1,2}[-/]\d{1,2}', title):
                          summary = item.get('summary', '')
                          if summary:
                              fixed = summary[:30].rstrip('，。、；：！？ ')
                              item['title'] = fixed
                              warnings.append(f'{prefix}: title 是日期 "{title}"，已从 summary 修复为 "{fixed}"')
                      # 检查纯数字
                      elif title.strip().isdigit():
                          summary = item.get('summary', '')
                          if summary:
                              fixed = summary[:30].rstrip('，。、；：！？ ')
                              item['title'] = fixed
                              warnings.append(f'{prefix}: title 是纯数字 "{title}"，已从 summary 修复为 "{fixed}"')

                  # category 校验
                  cat = item.get('category', '')
                  if cat and cat not in VALID_CATEGORIES:
                      warnings.append(f'{prefix}: 非标准 category "{cat}"，已自动归类为 technology')
                      item['category'] = 'technology'

                  # importance 校验
                  imp = item.get('importance')
                  if imp is not None:
                      try:
                          imp = int(imp)
                          if not 1 <= imp <= 5:
                              warnings.append(f'{prefix}: importance={imp} 超出范围，修正为 3')
                              item['importance'] = 3
                      except (ValueError, TypeError):
                          warnings.append(f'{prefix}: importance="{imp}" 非数字，修正为 3')
                          item['importance'] = 3

                  # source URL 格式
                  src = item.get('source', '')
                  if src and not src.startswith(('http://', 'https://')):
                      warnings.append(f'{prefix}: source 不是有效 URL: {src}')

                  # summary 长度
                  summary = item.get('summary', '')
                  if summary and len(summary) > 100:
                      item['summary'] = summary[:100].rstrip('，。、；：！？') + '……'
                      warnings.append(f'{prefix}: summary 过长({len(summary)}字)，已截断')

                  # analysis 长度
                  analysis = item.get('analysis', '')
                  if analysis and len(analysis) > 500:
                      item['analysis'] = analysis[:500].rstrip('，。、；：！？') + '……'
                      warnings.append(f'{prefix}: analysis 过长({len(analysis)}字)，已截断')

              # --- 深度快评 ---
              dd = data.get('deep_dive')
              if dd:
                  if not dd.get('topic'):
                      errors.append('deep_dive 缺少 topic')
                  if not dd.get('content') or len(dd.get('content', '')) < 50:
                      errors.append(f'deep_dive content 太短({len(dd.get("content",""))}字)')
              else:
                  warnings.append('deep_dive 为空（快评节点可能未输出）')

              # --- summary ---
              if not data.get('summary'):
                  warnings.append('整体 summary 为空')

              passed = len(errors) == 0
              return passed, warnings, errors

          MAX_RETRIES = 3
          passed = False
          last_errors = []
          for attempt in range(1, MAX_RETRIES + 1):
              if attempt > 1:
                  print(f"Retry {attempt}/{MAX_RETRIES}")
              result = subprocess.run([
                  'curl', '-s', '-m', '600',
                  '-X', 'POST', api_url,
                  '-H', f'Authorization: Bearer {api_key}',
                  '-H', 'Content-Type: application/json',
                  '-d', '@/tmp/dify_payload.json'
              ], capture_output=True, text=True, timeout=600)

              with open('/tmp/dify_stream.txt', 'w') as f:
                  f.write(result.stdout)

              if result.returncode != 0:
                  print(f'curl error: {result.stderr}')
                  sys.exit(1)

              print(f"Dify response length: {len(result.stdout)} bytes")

              # 3. 解析 SSE stream
              # 真实 Dify streaming 格式（已验证）：
              #   - workflow_started: data.event="workflow_started"
              #   - node_started: data.event="node_started", data.data.title=节点标题, data.data.node_id=节点ID
              #   - text_chunk: data.event="text_chunk", data.data.text=片段, data.data.from_variable_selector=["node_id","text"]
              #   - node_finished: data.event="node_finished", data.data.outputs={"text":"完整输出","usage":{...},"finish_reason":"stop"}
              #   - message_end: data.event="message_end"
              #   SSE 行格式: "data: {json}\n\n"（data:后一个空格）
              node_outputs = {}       # node_id -> output text
              node_titles = {}        # node_id -> title
              events_seen = set()
              stream_ended = False
              finished_nodes = set()  # 已通过 node_finished 获取完整输出的节点

              with open('/tmp/dify_stream.txt', 'r') as f:
                  buffer = f.read()

              for line in buffer.split('\n'):
                  line = line.strip()
                  if not line.startswith('data:'):
                      continue
                  data_str = line.split('data:', 1)[1].strip()
                  if not data_str:
                      continue
                  try:
                      event = json.loads(data_str)
                  except json.JSONDecodeError as e:
                      print(f"[WARN] Failed to parse SSE line: {e}")
                      continue

                  evt_type = event.get('event', '')
                  events_seen.add(evt_type)
                  data = event.get('data', {})

                  if evt_type == 'node_finished':
                      node_id = data.get('node_id', '')
                      title = data.get('title', '')
                      node_titles[node_id] = title
                      outputs = data.get('outputs', {})
                      # LLM 节点输出 key 为 "text"（已验证）
                      # 直接取 "text" key，如果不存在则取最长的
                      if 'text' in outputs:
                          node_outputs[node_id] = outputs['text']
                      elif outputs:
                          best_key = max(outputs.keys(), key=lambda k: len(str(outputs[k])))
                          node_outputs[node_id] = outputs[best_key]
                      finished_nodes.add(node_id)
                      print(f"  node_finished: title='{title}', output_len={len(node_outputs.get(node_id, ''))}")
                  elif evt_type == 'text_chunk':
                      selectors = data.get('from_variable_selector', [])
                      if selectors:
                          nid = selectors[0]
                          # 仅在 node_finished 未覆盖该节点时，用 text_chunk 拼接作为 fallback
                          if nid not in finished_nodes:
                              node_outputs[nid] = node_outputs.get(nid, '') + data.get('text', '')
                  elif evt_type == 'message_end':
                      stream_ended = True

              if not stream_ended:
                  print("[WARN] Stream did not end with message_end event — output may be incomplete")

              print(f"SSE events seen: {sorted(events_seen)}")
              print(f"Nodes parsed: {list(node_titles.values())}")

              # 4. 提取各节点输出
              def find_output(keyword):
                  for nid, title in node_titles.items():
                      if keyword in title:
                          return node_outputs.get(nid, '')
                  return ''

              items_text = find_output('重构')
              deep_dive_text = find_output('快评')
              print(f"重构 output: {len(items_text)} chars")
              print(f"快评 output: {len(deep_dive_text)} chars")
              # Debug: 打印重构输出的前 500 字符，方便排查解析问题
              print(f"重构 output preview: {repr(items_text[:500])}")

              # 5. 生成数据文件
              import re
              from pathlib import Path

              DATA_DIR = Path('public/data')
              DATA_DIR.mkdir(parents=True, exist_ok=True)

              # 解析 items —— 兼容 LLM 输出的常见 JSON 错误
              def fix_llm_json(text):
                  """修复 LLM 生成的 JSON 中的常见错误：未转义双引号、尾部逗号等"""
                  # 1. 修复未转义的双引号（在中文文本中最常见）
                  # 匹配 JSON 字符串值中的裸双引号（如 "事实 grounded" 中的 second quote）
                  # 策略：在每个 JSON 字符串值内，将非转义的 " 替换为 \"
                  result = []
                  in_string = False
                  escape_next = False
                  for i, ch in enumerate(text):
                      if escape_next:
                          result.append(ch)
                          escape_next = False
                          continue
                      if ch == '\\' and in_string:
                          result.append(ch)
                          escape_next = True
                          continue
                      if ch == '"' and not in_string:
                          result.append(ch)
                          in_string = True
                          continue
                      if ch == '"' and in_string:
                          # 检查下一个非空白字符是否是 JSON 语法字符
                          rest = text[i+1:].lstrip()
                          json_chars = set(':,]}')
                          if rest and rest[0] in json_chars:
                              result.append(ch)
                              in_string = False
                          else:
                              # 这个引号很可能是未转义的，转义它
                              result.append('\\"')
                      else:
                          result.append(ch)
                  text = ''.join(result)
                  # 2. 去掉尾部逗号（],} 前的 ,）
                  text = re.sub(r',(\s*[}\]])', r'\1', text)
                  return text

              def extract_json(text):
                  """从 LLM 输出中提取 JSON，兼容 markdown 代码块包裹"""
                  if not text:
                      return None
                  # 先尝试直接解析
                  text = text.strip()
                  try:
                      return json.loads(text)
                  except json.JSONDecodeError as e:
                      print(f"[DEBUG] Direct parse failed: {e}")
                  # 尝试修复 LLM JSON 后再解析
                  try:
                      fixed = fix_llm_json(text)
                      if fixed != text:
                          print(f"[DEBUG] Trying fix_llm_json...")
                          return json.loads(fixed)
                  except json.JSONDecodeError as e:
                      print(f"[DEBUG] fix_llm_json failed: {e}")
                  # 尝试去掉 markdown 代码块包裹
                  m = re.search(r'```(?:json)?\s*\n?([\s\S]*?)\n?\s*```', text)
                  if m:
                      try:
                          return json.loads(m.group(1))
                      except json.JSONDecodeError as e:
                          print(f"[DEBUG] markdown-block parse failed: {e}")
                  # 最后尝试匹配最外层 { } + 修复
                  m = re.search(r'\{[\s\S]*\}', text)
                  if m:
                      try:
                          fixed = fix_llm_json(m.group())
                          return json.loads(fixed)
                      except json.JSONDecodeError as e:
                          print(f"[DEBUG] brace-match+fix failed: {e}")
                  print(f"[ERROR] Failed to extract JSON from text ({len(text)} chars)")
                  return None

              items_data = extract_json(items_text)
              if items_data:
                  items_parsed = items_data.get('items', []) if isinstance(items_data, dict) else items_data if isinstance(items_data, list) else []
              else:
                  items_parsed = []
                  print("[ERROR] items_text could not be parsed as JSON")

              for i, item in enumerate(items_parsed):
                  # 强制用当天日期重写 ID（Dify 可能输出旧日期）
                  item['id'] = f'{date}-{i+1:03d}'
                  if 'collected_at' not in item:
                      item['collected_at'] = f'{date}T06:00:00+08:00'

              # 解析 deep_dive
              deep_dive = None
              if deep_dive_text:
                  deep_dive = extract_json(deep_dive_text)

              site_data = {
                  'date': date,
                  'generated_at': datetime.now(timezone(timedelta(hours=8))).isoformat(),
                  'summary': '',
                  'items': items_parsed,
              }
              if deep_dive:
                  site_data['deep_dive'] = deep_dive

              summaries = [it.get('summary','') or it.get('summary_cn','') for it in items_parsed[:3] if it.get('summary') or it.get('summary_cn')]
              if summaries:
                  site_data['summary'] = '；'.join(summaries)

    
          # 内容级去重：标题+摘要与近7天内容重叠度>0.5则排除
              seen_articles = []
              for d_offset in range(1, 31):
                  past_file = _data_dir / f'{(datetime.now(timezone(timedelta(hours=8))) - timedelta(days=d_offset)).strftime("%Y-%m-%d")}.json'
                  if past_file.exists():
                      try:
                          past_data = json.loads(open(past_file).read())
                          for it in past_data.get('items', []):
                              t = (it.get('title', '') or '').strip()
                              s = (it.get('summary', '') or '').strip()
                              if len(t) >= 6:
                                  seen_articles.append({'title': t, 'summary': s})
                      except:
                          pass

              def text_overlap(t1, s1, t2, s2):
                  """标题+摘要综合重叠度"""
                  combined1 = (t1 + ' ' + (s1 or ''))[:200]
                  combined2 = (t2 + ' ' + (s2 or ''))[:200]
                  if len(combined1) < 10 or len(combined2) < 10:
                      return 0
                  # 找最长公共子串
                  shorter, longer = (combined1, combined2) if len(combined1) <= len(combined2) else (combined2, combined1)
                  for n in range(len(shorter), 4, -1):
                      for i in range(len(shorter) - n + 1):
                          chunk = shorter[i:i+n]
                          if chunk in longer:
                              return n / len(shorter)
                  return 0

              deduped_items = []
              for it in items_parsed:
                  title = (it.get('title', '') or '').strip()
                  summary = (it.get('summary', '') or '').strip()
                  if len(title) < 6:
                      deduped_items.append(it)
                      continue
                  duplicate = False
                  for seen in seen_articles:
                      seen_title = seen.get('title', '')
                      # 标题完全一致则直接判重
                      if title == seen_title:
                          duplicate = True
                          break
                      # 标题+摘要综合重叠度 > 0.45 或标题单独重叠度 > 0.8
                      if text_overlap(title, summary, seen['title'], seen['summary']) > 0.45:
                          duplicate = True
                          break
                      if len(title) > 8 and seen_title and text_overlap(title, '', seen_title, '') >= 0.6:
                          duplicate = True
                          break
                  if not duplicate:
                      deduped_items.append(it)
                  # else: silently skip duplicate

              if deduped_items:
                  items_parsed = deduped_items
                  site_data['items'] = items_parsed

          # 6. 质检：出门前的最后检查
    
          # 关键词重新归类：硬件
              hardware_kw = ['AI眼镜', '智能眼镜', 'AR眼镜', 'AI穿戴', 'NPU', 'TPU', 'AI芯片',
                             'AI加速器', 'AI硬件', 'NVIDIA', '英伟达', 'HBM', '显存',
                             '机器人', '自动驾驶', '具身智能', 'AI设备', '神经处理',
                             'AI处理器', 'AI相机', 'AI耳机', 'AI手表', 'AI戒指']
              for it in items_parsed:
                  title_lower = (it.get('title', '')).lower()
                  if any(kw.lower() in title_lower for kw in hardware_kw):
                      it['category'] = 'hardware'

              VALID_CATEGORIES = {'technology', 'application', 'hardware', 'thought'}

              passed, warnings, errors = quality_check(site_data)

              print(f"\n{'='*50}")
              print(f"质检结果: {'✅ 通过' if passed else '❌ 不通过'}")
              if warnings:
                  print(f"⚠️  警告 ({len(warnings)}):")
                  for w in warnings:
                      print(f"   - {w}")
              if errors:
                  print(f"❌ 错误 ({len(errors)}):")
                  for e in errors:
                      print(f"   - {e}")
              print(f"{'='*50}\n")


              if passed:
                  break
              last_errors = errors
          # end for
          if not passed:
              print(f"[FATAL] {MAX_RETRIES} retries failed")
              sys.exit(1)

          with open(DATA_DIR / f'{date}.json', 'w') as f:
              json.dump(site_data, f, ensure_ascii=False, indent=2)
          print(f"Written: {date}.json ({len(items_parsed)} items)")

          with open(DATA_DIR / 'latest.json', 'w') as f:
              json.dump(site_data, f, ensure_ascii=False, indent=2)
          print("Written: latest.json")

          # 更新 index
          index_file = DATA_DIR / 'index.json'
          dates = []
          if index_file.exists():
              try: dates = json.loads(open(index_file).read()).get('dates', [])
              except: pass
          if date not in dates:
              dates.insert(0, date)
          dates = sorted(set(dates), reverse=True)
          with open(index_file, 'w') as f:
              json.dump({'dates': dates, 'latest': dates[0] if dates else None}, f, ensure_ascii=False, indent=2)
          print(f"Written: index.json ({len(dates)} dates)")

          # ========== hero-state.json 生成/更新 ==========
          hero_state_path = DATA_DIR / 'hero-state.json'

          def load_hero_state():
              if hero_state_path.exists():
                  try:
                      return json.loads(open(hero_state_path).read())
                  except Exception:
                      pass
              return {'updated_at': '', 'items': []}

          def extract_topic(item):
              """从标题中提取语义核心：去导语 -> 取第一主句 -> 最多18字"""
              import re
              title0 = (item.get('title', '') or item.get('content', '')).strip()
              if not title0:
                  return ''
              MAX_LEN = 18
          
              # Step 1: 去掉开头导语
              intro_words = [
                  '深度解析', '深度分析', '深入解读',
                  '聚焦', '探讨', '分析', '解读', '盘点', '综述',
                  '研究', '调查', '揭秘', '曝光', '实测', '对比',
                  '观点', '评论', 'Preview', 'Review',
              ]
              for w in sorted(intro_words, key=len, reverse=True):
                  if title0.startswith(w):
                      title0 = title0[len(w):].lstrip('：: ')
                      break
          
              # Step 2: 取第一个分句
              min_len = 4 if len(title0) > 10 else 2
              for sep in ['，', '。', '；', '、']:
                  idx = title0.find(sep)
                  if idx > 0 and idx >= min_len:
                      title0 = title0[:idx].strip()
                      break
          
              # Step 3: 截断
              if len(title0) <= MAX_LEN:
                  return title0
              return title0[:MAX_LEN-1] + '…'

          FIXED_L1 = 9
          FIXED_L2 = 10
          FIXED_L3 = 15

          old_state = load_hero_state()
          old_items = old_state.get('items', [])
          old_l1_items = [i for i in old_items if i.get('level') == 1]
          old_l2_items = [i for i in old_items if i.get('level') == 2]
          old_l3_items = [i for i in old_items if i.get('level') == 3]

          # ===== L1: 双重新鲜度检查（来源重叠 + 来源日期老化） =====
          # 1. 昨日来源去重：source URL 在昨日数据中出现过 → 降权
          yesterday_str = (datetime.now(timezone(timedelta(hours=8))) - timedelta(days=1)).strftime('%Y-%m-%d')
          yesterday_file = DATA_DIR / f'{yesterday_str}.json'
          yesterday_sources = set()
          if yesterday_file.exists():
              try:
                  yd = json.loads(open(yesterday_file).read())
                  for it in yd.get('items', []):
                      if it.get('source'):
                          yesterday_sources.add(it['source'])
              except:
                  pass
          # 2. 来源日期老化惩罚：从 smol.ai URL 提取日期，按天数打折 importance
          def src_age_days(source_url, today_str):
              m = re.search(r'(\d{2})-(\d{2})-(\d{2})', source_url or '')
              if m:
                  yy, mm, dd = int(m.group(1)), int(m.group(2)), int(m.group(3))
                  src_date = f"20{yy}-{mm:02d}-{dd:02d}"
                  try:
                      src_dt = datetime.strptime(src_date, '%Y-%m-%d')
                      today_dt = datetime.strptime(today_str, '%Y-%m-%d')
                      return max(0, (today_dt - src_dt).days)
                  except:
                      pass
              return 0
          AGE_WEIGHT = 0.7  # 每天老化扣 0.7 分（2天旧闻 imp=5 → 有效分 3.6）
          # 复合排序：(新鲜来源 > 旧来源, 有效重要性 DESC, 原始重要性 DESC)
          sorted_items = sorted(items_parsed,
              key=lambda x: (
                  0 if x.get('source', '') in yesterday_sources else 1,
                  x.get('importance', 0) - src_age_days(x.get('source', ''), date) * AGE_WEIGHT,
                  x.get('importance', 0)
              ),
              reverse=True)
          new_candidates = sorted_items[:FIXED_L1]

          new_l1 = []
          for idx, item in enumerate(new_candidates):
              try:
                  original_index = items_parsed.index(item)
              except ValueError:
                  original_index = idx
              new_l1.append({
                  'id': f'sig_{date}_{len(new_l1)+1:03d}',
                  'level': 1,
                  'content': item.get('title', ''),
                  'summary': (item.get('summary', '') or '')[:40],
                  'source': item.get('source', ''),
                  'date': date,
                  'signal_index': original_index,
                  '_tags': item.get('tags', []),
              })

          # 补水：当天新内容不够 FIXED_L1 时从旧 L1 补
          remaining = FIXED_L1 - len(new_l1)
          if remaining > 0 and old_l1_items:
              for old in old_l1_items[:remaining]:
                  old['date'] = date
                  old['signal_index'] = None
                  new_l1.append(old)

          # 溢流到L2
          kept_l1_content = {i['content'] for i in new_l1}
          overflow_to_l2 = [i for i in old_l1_items if i['content'] not in kept_l1_content]

          # ===== L2 =====
          l2_from_overflow = []
          for item in overflow_to_l2:
              topic = extract_topic({**item, 'title': item.get('content', '')})
              l2_from_overflow.append({
                  'id': f'tag_{date}_{len(l2_from_overflow)+1:03d}',
                  'level': 2,
                  'content': topic,
                  'date': date,
              })

          l2_pool = l2_from_overflow + old_l2_items
          l2_pool.sort(key=lambda x: x.get('date', ''), reverse=True)
          new_l2 = l2_pool[:FIXED_L2]

          kept_l2_content = {i['content'] for i in new_l2}
          overflow_to_l3 = [i for i in l2_pool if i['content'] not in kept_l2_content]

          # ===== L3 =====
          l3_from_overflow = []
          for item in overflow_to_l3:
              l3_from_overflow.append({
                  'id': item['id'].replace('tag_', 'word_'),
                  'level': 3,
                  'content': item['content'],
                  'date': item.get('date', date),
              })

          l3_pool = l3_from_overflow + old_l3_items
          l3_pool.sort(key=lambda x: x.get('date', ''), reverse=True)
          new_l3 = l3_pool[:FIXED_L3]

          all_items = new_l1 + new_l2 + new_l3
          for it in all_items:
              it.pop('_tags', None)

          seen = set()
          deduped = []
          for it in reversed(all_items):
              key = it['content']
              if key not in seen:
                  seen.add(key)
                  deduped.append(it)
          all_items = list(reversed(deduped))

          hero_state = {'updated_at': date, 'items': all_items}
          with open(hero_state_path, 'w') as f:
              json.dump(hero_state, f, ensure_ascii=False, indent=2)

          l1c = sum(1 for i in all_items if i.get('level') == 1)
          l2c = sum(1 for i in all_items if i.get('level') == 2)
          l3c = sum(1 for i in all_items if i.get('level') == 3)
          overflow_l1 = len(overflow_to_l2)
          overflow_l2 = len(overflow_to_l3)
          evicted = len(l3_pool) - FIXED_L3 if len(l3_pool) > FIXED_L3 else 0
          print(f"Water-bucket: new={len(new_candidates)}, overflow L1->L2={overflow_l1}, L2->L3={overflow_l2}, evicted={evicted}")
          print(f"Written: hero-state.json ({len(all_items)} items: L1={l1c}, L2={l2c}, L3={l3c})")
          # end for
          if not passed:
              print(f"[FATAL] {MAX_RETRIES} retries failed")
              sys.exit(1)
          PYEOF

      - name: Site-wide dedup auto-clean
        run: |
          python3 << 'PYEOF'
          import json, sys, re
          from pathlib import Path

          data_dir = Path('public/data')
          today_file = max(data_dir.glob('20??-??-??.json'), key=lambda p: p.name)
          today_data = json.loads(open(today_file).read())
          items = today_data.get('items', [])
          original_count = len(items)

          # Build set of all titles from ALL past history, excluding today
          all_past_titles = set()
          for f in sorted(data_dir.glob('20??-??-??.json')):
              if f.name == today_file.name:
                  continue
              try:
                  d = json.loads(open(f).read())
                  for it in d.get('items', []):
                      t = (it.get('title', '') or '').strip()
                      if len(t) >= 4:
                          all_past_titles.add(t)
              except:
                  pass

          cleaned = []
          removed = []
          for it in items:
              t = (it.get('title', '') or '').strip()
              if t in all_past_titles:
                  removed.append(t)
              else:
                  cleaned.append(it)

          if removed:
              today_data['items'] = cleaned
              with open(today_file, 'w') as f:
                  json.dump(today_data, f, ensure_ascii=False, indent=2)
              for t in removed:
                  print(f'  ✗ Site-wide dedup removed: {t}')
              print(f'  ✓ Auto-cleaned {len(removed)} duplicate(s), {original_count}→{len(cleaned)} items')
          else:
              print(f'  ✓ Site-wide dedup: 0 duplicates ({len(all_past_titles)} historical titles checked)')

          PYEOF

